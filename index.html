<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JoJo - Claude Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'SF Mono', 'Menlo', 'Consolas', 'JetBrains Mono', monospace;
  background: #0a0e14;
  height: 100vh;
  height: 100dvh;
  display: flex;
  overflow: hidden;
  color: #00ff88;
}

/* === Left Sidebar === */
.sidebar {
  width: 280px;
  background: #0d1117;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: width 0.3s ease, transform 0.3s ease;
  position: relative;
  border-right: 1px solid rgba(0, 255, 136, 0.1);
}
.sidebar.collapsed {
  width: 0;
  overflow: hidden;
}
.sidebar-top {
  padding: 16px;
  display: flex;
  gap: 8px;
}
.sidebar-top .new-chat-btn {
  flex: 1;
  padding: 10px 16px;
  background: rgba(0, 255, 136, 0.05);
  border: 1px solid rgba(0, 255, 136, 0.15);
  border-radius: 8px;
  color: #00ff88;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
}
.sidebar-top .new-chat-btn:hover { background: rgba(0, 255, 136, 0.1); }
.sidebar-top .toggle-btn {
  width: 40px;
  background: rgba(0, 255, 136, 0.05);
  border: 1px solid rgba(0, 255, 136, 0.15);
  border-radius: 8px;
  color: #00ff88;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.sidebar-top .toggle-btn:hover { background: rgba(0, 255, 136, 0.1); }

/* Search */
.sidebar-search {
  padding: 0 16px 12px;
}
.sidebar-search input {
  width: 100%;
  padding: 8px 12px;
  background: rgba(0, 20, 10, 0.6);
  border: 1px solid rgba(0, 255, 136, 0.15);
  border-radius: 6px;
  color: #00ff88;
  font-size: 13px;
  outline: none;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
}
.sidebar-search input::placeholder { color: rgba(0, 255, 136, 0.3); }
.sidebar-search input:focus { border-color: #00ff88; box-shadow: 0 0 6px rgba(0, 255, 136, 0.2); }

/* Session List */
.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px;
}
.session-list::-webkit-scrollbar { width: 4px; }
.session-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

.date-group {
  padding: 8px 8px 4px;
  font-size: 11px;
  color: rgba(0, 255, 136, 0.35);
  font-weight: 500;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.session-item {
  padding: 10px 12px;
  color: rgba(0, 255, 136, 0.6);
  font-size: 14px;
  cursor: pointer;
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
  position: relative;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
}
.session-item:hover { background: rgba(0, 255, 136, 0.05); }
.session-item.active { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
.session-item .s-icon { font-size: 16px; flex-shrink: 0; }
.session-item .s-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.4;
}
.session-item .s-actions {
  display: none;
  gap: 4px;
  flex-shrink: 0;
}
.session-item:hover .s-actions { display: flex; }
.session-item .s-actions button {
  background: none;
  border: none;
  color: rgba(0, 255, 136, 0.4);
  font-size: 14px;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 4px;
}
.session-item .s-actions button:hover { color: #00ff88; background: rgba(0, 255, 136, 0.1); }
.session-item .s-actions button.del:hover { color: #ff3344; }

/* === Main Chat Area === */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: #0a0e14;
}

/* Header */
.header {
  background: rgba(10, 14, 20, 0.95);
  color: #00ff88;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(0, 255, 136, 0.15);
}
.header .btn {
  background: none;
  border: none;
  color: #00ff88;
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  opacity: 0.8;
  border-radius: 6px;
}
.header .btn:hover { opacity: 1; background: rgba(0, 255, 136, 0.1); }
.header .title {
  font-size: 17px;
  font-weight: 500;
  text-align: center;
  flex: 1;
  color: #00ff88;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  text-shadow: 0 0 8px rgba(0, 255, 136, 0.3);
}
.header .sidebar-toggle-main { display: none; }
.sidebar.collapsed ~ .main .header .sidebar-toggle-main { display: block; }

/* Chat area */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 12px 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  -webkit-overflow-scrolling: touch;
  background: #0a0e14;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 23px,
      rgba(0, 255, 136, 0.03) 23px,
      rgba(0, 255, 136, 0.03) 24px
    );
}

/* Message row */
.msg-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  animation: msgIn 0.3s ease;
}
.msg-row.user { flex-direction: row-reverse; }

@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Avatar */
.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: white;
  font-weight: bold;
}
.avatar.claude { background: url('/uploads/9747f5b57d7a424ebc6b9b9035df766a.jpg') center/cover no-repeat; }
.avatar.me { background: url('/uploads/198225aa1f7445b9bfa46575e1452592.jpg') center/cover no-repeat; }

/* Bubble */
.bubble {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 15px;
  line-height: 1.6;
  word-wrap: break-word;
  position: relative;
  font-family: 'SF Mono', 'Menlo', 'Consolas', 'JetBrains Mono', monospace;
}
.msg-row.user .bubble {
  background: rgba(255, 255, 255, 0.05);
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, 0.15);
  text-shadow: none;
}
.msg-row.user .bubble::after {
  content: '';
  position: absolute;
  right: -6px;
  top: 12px;
  width: 0; height: 0;
  border: 6px solid transparent;
  border-left-color: rgba(255, 255, 255, 0.15);
  border-right: none;
}
.msg-row.assistant .bubble {
  background: rgba(0, 255, 136, 0.08);
  color: #00ff88;
  font-weight: 700;
  border: 1px solid rgba(0, 255, 136, 0.2);
  text-shadow: 0 0 4px rgba(0, 255, 136, 0.2);
}
.msg-row.assistant .bubble::after {
  content: '';
  position: absolute;
  left: -6px;
  top: 12px;
  width: 0; height: 0;
  border: 6px solid transparent;
  border-right-color: rgba(255, 255, 255, 0.1);
  border-left: none;
}

/* Code blocks */
.bubble pre {
  background: rgba(0, 20, 10, 0.8);
  color: #00ff88;
  padding: 12px 14px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 8px 0;
  font-size: 13px;
  font-family: "JetBrains Mono", "SF Mono", Monaco, Consolas, monospace;
  line-height: 1.6;
  border: 1px solid rgba(0, 255, 136, 0.2);
}
.bubble pre code { background: none; padding: 0; color: inherit; font-size: inherit; font-weight: 400; }
.bubble code {
  background: rgba(0, 255, 136, 0.1);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: "JetBrains Mono", "SF Mono", Monaco, Consolas, monospace;
  color: #00ccff;
  font-weight: 400;
}
.bubble strong { font-weight: 800; }
.bubble em { font-style: italic; }

/* Tables - Terminal style */
.bubble table {
  border-collapse: collapse;
  width: 100%;
  margin: 10px 0;
  font-size: 14px;
  border: 1px solid rgba(0, 255, 136, 0.2);
  border-radius: 4px;
  overflow: hidden;
}
.bubble thead th {
  background: rgba(0, 255, 136, 0.1);
  color: #00ff88;
  font-weight: 600;
  padding: 8px 12px;
  text-align: left;
  border-bottom: 2px solid rgba(0, 255, 136, 0.3);
  border-right: 1px solid rgba(0, 255, 136, 0.15);
  white-space: nowrap;
}
.bubble thead th:last-child { border-right: none; }
.bubble tbody td {
  padding: 7px 12px;
  border-bottom: 1px solid rgba(0, 255, 136, 0.08);
  border-right: 1px solid rgba(0, 255, 136, 0.08);
  color: inherit;
}
.bubble tbody td:last-child { border-right: none; }
.bubble tbody tr:nth-child(even) { background: rgba(0, 255, 136, 0.03); }
.bubble tbody tr:hover { background: rgba(0, 255, 136, 0.08); }
.bubble tbody tr:last-child td { border-bottom: none; }

/* Headings */
.bubble h1, .bubble h2, .bubble h3, .bubble h4 {
  margin: 12px 0 6px;
  color: inherit;
  line-height: 1.3;
}
.bubble h1 { font-size: 1.4em; border-bottom: 2px solid rgba(0, 255, 136, 0.2); padding-bottom: 4px; }
.bubble h2 { font-size: 1.25em; border-bottom: 1px solid rgba(0, 255, 136, 0.15); padding-bottom: 3px; }
.bubble h3 { font-size: 1.1em; }
.bubble h4 { font-size: 1em; opacity: 0.8; }

/* Lists */
.bubble ul, .bubble ol {
  margin: 6px 0;
  padding-left: 24px;
}
.bubble li {
  margin: 3px 0;
  line-height: 1.6;
  color: inherit;
}
.bubble li > ul, .bubble li > ol { margin: 2px 0; }

/* Blockquote */
.bubble blockquote {
  border-left: 3px solid #00ff88;
  background: rgba(0, 255, 136, 0.05);
  margin: 8px 0;
  padding: 8px 14px;
  color: rgba(0, 255, 136, 0.7);
  border-radius: 0 4px 4px 0;
}

/* Horizontal rule */
.bubble hr {
  border: none;
  border-top: 1px solid rgba(0, 255, 136, 0.2);
  margin: 12px 0;
}

/* Typing dots */
.typing-dots {
  display: flex;
  gap: 4px;
  padding: 4px 0;
}
.typing-dots span {
  width: 7px; height: 7px;
  background: #00ff88;
  border-radius: 50%;
  animation: dotPulse 1.4s infinite;
  box-shadow: 0 0 4px rgba(0, 255, 136, 0.5);
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 60%, 100% { transform: scale(0.8); opacity: 0.5; }
  30% { transform: scale(1.2); opacity: 1; }
}

/* Time stamp */
.timestamp {
  text-align: center;
  font-size: 12px;
  color: rgba(0, 255, 136, 0.4);
  padding: 4px 12px;
  background: rgba(0, 255, 136, 0.05);
  border-radius: 4px;
  align-self: center;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
}

/* Input area */
.input-area {
  padding: 8px 12px 12px;
  background: rgba(10, 14, 20, 0.95);
  border-top: 1px solid rgba(0, 255, 136, 0.15);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  width: 100%;
}
.input-area textarea {
  flex: 1;
  border: 1px solid rgba(0, 255, 136, 0.2);
  border-radius: 6px;
  padding: 9px 12px;
  font-size: 16px;
  resize: none;
  max-height: 100px;
  outline: none;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  line-height: 1.4;
  background: rgba(0, 20, 10, 0.6);
  color: #00ff88;
  caret-color: #00ff88;
}
.input-area textarea::placeholder { color: rgba(0, 255, 136, 0.3); }
.input-area textarea:focus { border-color: #00ff88; box-shadow: 0 0 8px rgba(0, 255, 136, 0.2); }
.img-btn {
  width: 38px;
  height: 38px;
  background: rgba(0, 255, 136, 0.1);
  border: 1px solid rgba(0, 255, 136, 0.2);
  border-radius: 6px;
  font-size: 20px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  color: #00ff88;
}
.img-btn:hover { background: rgba(0, 255, 136, 0.2); }
.send-btn {
  padding: 8px 16px;
  background: rgba(0, 255, 136, 0.15);
  border: 1px solid #00ff88;
  border-radius: 6px;
  color: #00ff88;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  height: 38px;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  text-shadow: 0 0 6px rgba(0, 255, 136, 0.4);
}
.send-btn:hover { background: rgba(0, 255, 136, 0.25); box-shadow: 0 0 12px rgba(0, 255, 136, 0.3); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { background: rgba(0, 255, 136, 0.05); border-color: rgba(0, 255, 136, 0.2); color: rgba(0, 255, 136, 0.3); cursor: not-allowed; }
/* Image preview strip */
.img-preview-strip {
  display: flex;
  gap: 6px;
  width: 100%;
  flex-wrap: wrap;
}
.img-preview-strip:empty { display: none; }
.img-preview-item {
  position: relative;
  width: 60px;
  height: 60px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid rgba(0, 255, 136, 0.2);
}
.img-preview-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.img-preview-item .remove-img {
  position: absolute;
  top: 0; right: 0;
  width: 18px; height: 18px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border: none;
  border-radius: 0 0 0 6px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* Drag overlay */
.drag-overlay {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 255, 136, 0.05);
  border: 3px dashed #00ff88;
  border-radius: 8px;
  z-index: 100;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: #00ff88;
  font-weight: 600;
  pointer-events: none;
}
.drag-overlay.show { display: flex; }
/* Chat image */
.bubble img.chat-img {
  max-width: 240px;
  max-height: 240px;
  border-radius: 6px;
  cursor: pointer;
  display: block;
  margin: 4px 0;
}

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: rgba(0, 255, 136, 0.5);
  gap: 12px;
  padding: 40px;
}
.empty-logo {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, #D97706, #F59E0B);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  box-shadow: 0 4px 20px rgba(217,119,6,0.3);
}
.empty-state h2 { color: #00ff88; font-size: 18px; font-weight: 500; text-shadow: 0 0 8px rgba(0, 255, 136, 0.3); }
.empty-state p { color: rgba(0, 255, 136, 0.4); font-size: 14px; text-align: center; line-height: 1.6; font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; }

/* Emoji rain & notification */
.sticker-rain {
  position: fixed;
  pointer-events: none;
  font-size: 30px;
  animation: stickerFall 2s ease-in forwards;
  z-index: 100;
}
@keyframes stickerFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}
.notification {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: #FA5151;
  color: white;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 400;
  animation: notifIn 0.3s ease, notifOut 0.3s ease 2s forwards;
  box-shadow: 0 4px 12px rgba(250,81,81,0.4);
}
@keyframes notifIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes notifOut { to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }

/* Login overlay */
.login-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-overlay.hidden { display: none; }
.login-box {
  background: #1E1E1E;
  border-radius: 16px;
  padding: 40px 36px;
  text-align: center;
  max-width: 360px;
  width: 90%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.login-box .login-logo {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, #D97706, #F59E0B);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  margin: 0 auto 20px;
  box-shadow: 0 4px 20px rgba(217,119,6,0.3);
}
.login-box h2 {
  color: #eee;
  font-size: 20px;
  margin-bottom: 8px;
}
.login-box p {
  color: #888;
  font-size: 13px;
  margin-bottom: 24px;
}
.login-box input {
  width: 100%;
  padding: 12px 16px;
  background: #2A2A2A;
  border: 1px solid #444;
  border-radius: 8px;
  color: #eee;
  font-size: 16px;
  outline: none;
  text-align: center;
  letter-spacing: 2px;
}
.login-box input:focus { border-color: #07C160; }
.login-box input.shake {
  animation: shake 0.4s ease;
  border-color: #FA5151;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-4px); }
}
.login-box .login-btn {
  width: 100%;
  padding: 12px;
  background: #07C160;
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 16px;
  transition: background 0.2s;
}
.login-box .login-btn:hover { background: #06a850; }
.login-box .login-error {
  color: #FA5151;
  font-size: 13px;
  margin-top: 12px;
  min-height: 18px;
}

/* Scrollbar - chat container */
.chat-container {
  scrollbar-width: thin;
  scrollbar-color: rgba(0, 255, 136, 0.3) transparent;
}
.chat-container::-webkit-scrollbar { width: 8px; }
.chat-container::-webkit-scrollbar-track { background: transparent; margin: 4px 0; }
.chat-container::-webkit-scrollbar-thumb {
  background: rgba(0, 255, 136, 0.3);
  border-radius: 4px;
  border: 1px solid transparent;
  background-clip: padding-box;
}
.chat-container::-webkit-scrollbar-thumb:hover { background: rgba(0, 255, 136, 0.5); }
.chat-container::-webkit-scrollbar-thumb:active { background: rgba(0, 255, 136, 0.6); }

/* Mobile overlay */
.sidebar-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 299;
  display: none;
}
.sidebar-overlay.show { display: block; }

/* === Right Sidebar (Cron Panel) === */
.right-panel {
  width: 320px;
  background: #1E1E1E;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transform: translateX(100%);
  width: 0;
  overflow: hidden;
  transition: width 0.3s ease, transform 0.3s ease;
}
.right-panel.open {
  width: 320px;
  transform: translateX(0);
}
.right-panel-header {
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #333;
  flex-shrink: 0;
}
.right-panel-header h3 {
  color: #eee;
  font-size: 15px;
  font-weight: 500;
  margin: 0;
}
.right-panel-header .close-btn {
  background: none;
  border: none;
  color: #888;
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
.right-panel-header .close-btn:hover { color: #fff; background: #333; }
.right-panel-header .refresh-btn {
  background: none;
  border: none;
  color: #888;
  font-size: 14px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
.right-panel-header .refresh-btn:hover { color: #07C160; background: #333; }

.cron-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.cron-list::-webkit-scrollbar { width: 4px; }
.cron-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

.cron-group-label {
  padding: 8px 8px 4px;
  font-size: 11px;
  color: #07C160;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.cron-item {
  padding: 10px 12px;
  margin-bottom: 4px;
  background: #2A2A2A;
  border-radius: 8px;
  border-left: 3px solid #444;
}
.cron-item.type-cron { border-left-color: #F59E0B; }

.cron-item .cron-type {

.cron-item .cron-name {

.cron-item .cron-detail {

}
.cron-empty {

}
.cron-loading {
  text-align: center;
  color: #888;

}

/* Cron tooltip */
.cron-item {
  position: relative;
}
.cron-tooltip {
  visibility: hidden;
  opacity: 0;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #07C160;
  color: #fff;
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 6px;
  white-space: nowrap;
  max-width: 260px;
  white-space: normal;
  line-height: 1.4;
  z-index: 10;
  pointer-events: none;
  transition: opacity 0.2s, visibility 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.cron-tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: #07C160;
}
.cron-item:hover .cron-tooltip {
  visibility: visible;
  opacity: 1;
}

.admin-modal h3 .close-admin {

.admin-add-row {

/* === Task Progress Indicator - Sci-Fi Blue Style === */
.task-progress {
  position: absolute;
  bottom: 8px;
  left: 8px;
  right: 8px;
  height: 280px;
  background: rgba(6, 10, 20, 0.95);
  border: 1px solid rgba(0, 170, 255, 0.25);
  border-radius: 10px;
  padding: 16px;
  z-index: 500;
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-shadow: 0 0 15px rgba(0, 170, 255, 0.08), inset 0 0 30px rgba(0, 170, 255, 0.03);
}
.task-progress::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, #00aaff, transparent);
  animation: taskScanline 2.5s linear infinite;
}
.task-progress::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0, 170, 255, 0.012) 3px,
    rgba(0, 170, 255, 0.012) 4px
  );
  pointer-events: none;
}
@keyframes taskScanline {
  0% { opacity: 0; transform: translateX(-100%); }
  50% { opacity: 1; }
  100% { opacity: 0; transform: translateX(100%); }
}
.task-progress.active {
  border-color: rgba(0, 170, 255, 0.5);
  box-shadow: 0 0 20px rgba(0, 170, 255, 0.15), inset 0 0 30px rgba(0, 170, 255, 0.05);
}
.task-progress-header {
  display: flex;
  align-items: center;
  gap: 8px;
}
.task-progress-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(0, 170, 255, 0.4);
  box-shadow: 0 0 4px rgba(0, 170, 255, 0.2);
  transition: all 0.3s ease;
}
.task-progress-dot.active {
  background: #00aaff;
  box-shadow: 0 0 8px #00aaff, 0 0 16px rgba(0, 170, 255, 0.4);
  animation: taskPulse 1.5s ease-in-out infinite;
}
.task-progress-dot.done {
  animation: none;
  background: #00ccff;
  box-shadow: 0 0 10px #00ccff;
}
.task-progress-dot.warning {
  background: #ffaa00;
  box-shadow: 0 0 8px #ffaa00;
  animation: taskPulse 0.5s ease-in-out infinite;
}
.task-progress-dot.error {
  animation: none;
  background: #ff3344;
  box-shadow: 0 0 8px #ff3344;
}
@keyframes taskPulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px #00aaff, 0 0 16px rgba(0,170,255,0.4); }
  50% { opacity: 0.3; box-shadow: 0 0 3px #00aaff, 0 0 6px rgba(0,170,255,0.1); }
}
.task-progress-title {
  color: #00aaff;
  font-size: 11px;
  font-weight: 600;
  flex: 1;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.task-progress-timer {
  color: #00ccff;
  font-size: 28px;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  font-weight: 700;
  text-align: center;
  text-shadow: 0 0 12px rgba(0, 170, 255, 0.6), 0 0 24px rgba(0, 170, 255, 0.2);
  padding: 12px 0;
  letter-spacing: 3px;
}
.task-progress-status {
  color: rgba(0, 170, 255, 0.5);
  font-size: 10px;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  text-align: center;
  letter-spacing: 1px;
  min-height: 16px;
}
.task-progress-bar {
  height: 3px;
  background: rgba(0, 170, 255, 0.1);
  border-radius: 2px;
  overflow: hidden;
  margin: 8px 0;
}
.task-progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #0066ff, #00aaff, #00ccff);
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s ease;
  box-shadow: 0 0 8px rgba(0, 170, 255, 0.5);
}
.task-progress-bar-fill.indeterminate {
  width: 30%;
  animation: taskBarMove 1.8s ease-in-out infinite;
}
.task-progress-bar-fill.idle {
  width: 100%;
  opacity: 0.15;
  animation: none;
}
@keyframes taskBarMove {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}
.task-progress-stats {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: rgba(0, 170, 255, 0.35);
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">🤖</div>
    <h2>Welcome to JoJo</h2>
    <p>Please enter your access token</p>
    <input type="password" id="loginInput" placeholder="Enter token..." onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Enter</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-top">

    <button class="toggle-btn" onclick="toggleSidebar()" title="Collapse">◀</button>
  </div>
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="Search chats..." oninput="filterSessions(this.value)">
  </div>
  <div class="session-list" id="sessionList"></div>
  <div class="task-progress" id="taskProgress">
    <div class="task-progress-header">
      <div class="task-progress-dot" id="taskDot"></div>
      <div class="task-progress-title" id="taskTitle">PROCESSING</div>

    <div class="task-progress-timer" id="taskTimer">00:00</div>

      <div class="task-progress-bar-fill indeterminate" id="taskBarFill"></div>
    </div>

      <span id="taskBytes">0 CHARS</span>
      <span id="taskChunks">0 CHUNKS</span>
    </div>

</div>

<div class="main">
  <div class="header">
    <button class="btn sidebar-toggle-main" onclick="toggleSidebar()" title="History">☰</button>
    <div class="title">JoJo</div>
    <button class="btn" onclick="exportChat()" title="Export as Markdown">⬇</button>
    <button class="btn" onclick="toggleCronPanel()" title="Scheduled Tasks">&#9201;</button>
    <button class="btn admin-btn" id="adminBtn" onclick="toggleAdminPanel()" title="User Management" style="display:none;font-size:16px;">&#9881;</button>
    <button class="btn" onclick="showEasterEgg()" title="Surprise">⋯</button>

  </div>

  <div class="chat-container" id="chatContainer">
    <div class="empty-state" id="emptyState">
      <div class="empty-logo">🤖</div>
      <h2>Hi, I'm JoJo!</h2>
      <p>Ask me anything~<br>Code / Chat / Creative Writing</p>

  <div class="input-area" id="inputArea">
    <div class="drag-overlay" id="dragOverlay">Drop image here</div>
    <div class="img-preview-strip" id="imgPreviewStrip"></div>
    <div class="input-row">
      <button class="img-btn" id="imgBtn" title="Upload image" onclick="document.getElementById('imgFileInput').click()">+</button>
      <input type="file" id="imgFileInput" accept="image/*" multiple style="display:none" onchange="handleFileSelect(this.files)">
      <textarea id="messageInput" rows="1" placeholder="Send a message..."
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<div class="right-panel" id="rightPanel">
  <div class="right-panel-header">
    <h3>Scheduled Tasks</h3>
    <div>
      <button class="refresh-btn" onclick="loadCronJobs()" title="Refresh">&#8635;</button>
      <button class="close-btn" onclick="toggleCronPanel()" title="Close">&#10005;</button>
    </div>
  </div>

    <div class="cron-loading">Loading...</div>

<div class="admin-overlay" id="adminOverlay" onclick="if(event.target===this)toggleAdminPanel()">
  <div class="admin-modal">
    <h3>User Management <button class="close-admin" onclick="toggleAdminPanel()">&#10005;</button></h3>
    <div class="admin-add-row">
      <input type="text" id="adminNewUser" placeholder="New user token..." onkeydown="if(event.key==='Enter')adminAddUser()">
      <button onclick="adminAddUser()">Add</button>
    </div>
    <div class="admin-msg" id="adminMsg"></div>
    <div class="admin-user-list" id="adminUserList"></div>
  </div>

<script>
let isAdminUser = false;
let authToken = localStorage.getItem('authToken') || '';
let sessionId = localStorage.getItem('currentSessionId') || ('session_' + Math.random().toString(36).substr(2, 9));
localStorage.setItem('currentSessionId', sessionId);
const chatContainer = document.getElementById('chatContainer');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const emptyState = document.getElementById('emptyState');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sessionList = document.getElementById('sessionList');
const searchInput = document.getElementById('searchInput');
const loginOverlay = document.getElementById('loginOverlay');
const loginInput = document.getElementById('loginInput');
const loginError = document.getElementById('loginError');
let isStreaming = false;
let msgCount = 0;

// === Task Progress Tracker ===
const taskProgress = document.getElementById('taskProgress');
const taskDot = document.getElementById('taskDot');
const taskTitle = document.getElementById('taskTitle');
const taskTimer = document.getElementById('taskTimer');
const taskStatus = document.getElementById('taskStatus');
const taskBarFill = document.getElementById('taskBarFill');
const taskBytes = document.getElementById('taskBytes');
const taskChunks = document.getElementById('taskChunks');
let taskStartTime = null;
let taskTimerInterval = null;
let taskChunkCount = 0;
let taskCharCount = 0;

function taskProgressIdle() {
  taskTitle.textContent = 'SYSTEM READY';
  taskStatus.textContent = 'AWAITING INPUT';
  taskDot.className = 'task-progress-dot';
  taskBarFill.className = 'task-progress-bar-fill idle';
  taskBarFill.style.width = '';
  taskBarFill.style.background = '';
  taskTimer.textContent = '--:--';
  taskBytes.textContent = '-- CHARS';
  taskChunks.textContent = '-- CHUNKS';
  taskProgress.classList.remove('active');
}

function taskProgressShow(title) {
  taskTitle.textContent = (title || 'PROCESSING').toUpperCase();
  taskStatus.textContent = 'CONNECTING...';
  taskDot.className = 'task-progress-dot active';
  taskBarFill.className = 'task-progress-bar-fill indeterminate';
  taskBarFill.style.width = '';
  taskBarFill.style.background = '';
  taskBytes.textContent = '0 CHARS';
  taskChunks.textContent = '0 CHUNKS';
  taskChunkCount = 0;
  taskCharCount = 0;
  taskStartTime = Date.now();
  taskTimer.textContent = '00:00';
  taskProgress.classList.add('active');
  clearInterval(taskTimerInterval);
  taskTimerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - taskStartTime) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    taskTimer.textContent = m + ':' + s;
  }, 1000);
}

function taskProgressUpdate(chunkText) {
  taskChunkCount++;
  taskCharCount += chunkText.length;
  taskStatus.textContent = 'STREAM ACTIVE';
  taskBytes.textContent = taskCharCount.toLocaleString() + ' CHARS';
  taskChunks.textContent = taskChunkCount + ' CHUNKS';
}

let taskLastDataTime = null;
let taskDisconnectChecker = null;

function taskProgressDone(success) {
  clearInterval(taskTimerInterval);
  clearInterval(taskDisconnectChecker);
  taskDisconnectChecker = null;
  if (success) {
    taskStatus.textContent = 'COMPLETE';
    taskDot.className = 'task-progress-dot done';
    taskBarFill.className = 'task-progress-bar-fill';
    taskBarFill.style.width = '100%';
  } else {
    taskStatus.textContent = 'CONNECTION LOST';
    taskDot.className = 'task-progress-dot error';
    taskBarFill.className = 'task-progress-bar-fill';
    taskBarFill.style.width = '100%';
    taskBarFill.style.background = '#ff3344';
  }
  setTimeout(() => {
    taskProgressIdle();
  }, 5000);
}

function taskStartDisconnectWatch() {
  taskLastDataTime = Date.now();
  clearInterval(taskDisconnectChecker);
  taskDisconnectChecker = setInterval(() => {
    const silent = Math.floor((Date.now() - taskLastDataTime) / 1000);
    if (silent > 30) {
      taskStatus.textContent = 'WAITING... ' + silent + 'S';
      taskDot.className = 'task-progress-dot warning';
    }
  }, 2000);
}

function taskGotData() {
  taskLastDataTime = Date.now();
  taskDot.className = 'task-progress-dot';
  taskStatus.textContent = 'STREAM ACTIVE';
}
let allSessions = [];
let pendingImages = []; // {file, previewUrl}

const imgPreviewStrip = document.getElementById('imgPreviewStrip');
const inputArea = document.getElementById('inputArea');
const dragOverlay = document.getElementById('dragOverlay');

// Drag & drop
let dragCounter = 0;
inputArea.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; dragOverlay.classList.add('show'); });
inputArea.addEventListener('dragleave', (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dragOverlay.classList.remove('show'); } });
inputArea.addEventListener('dragover', (e) => { e.preventDefault(); });
inputArea.addEventListener('drop', (e) => {
  e.preventDefault(); dragCounter = 0; dragOverlay.classList.remove('show');
  const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
  if (files.length) addPendingImages(files);
});

// Paste image
messageInput.addEventListener('paste', (e) => {
  const items = [...(e.clipboardData?.items || [])];
  const imgItems = items.filter(i => i.type.startsWith('image/'));
  if (imgItems.length) {
    e.preventDefault();
    addPendingImages(imgItems.map(i => i.getAsFile()).filter(Boolean));
  }
});

function addPendingImages(files) {
  for (const f of files) {
    const url = URL.createObjectURL(f);
    pendingImages.push({ file: f, previewUrl: url });
  }
  renderImagePreviews();
}

function removePendingImage(idx) {
  URL.revokeObjectURL(pendingImages[idx].previewUrl);
  pendingImages.splice(idx, 1);
  renderImagePreviews();
}

function renderImagePreviews() {
  imgPreviewStrip.innerHTML = '';
  pendingImages.forEach((img, i) => {
    const div = document.createElement('div');
    div.className = 'img-preview-item';
    div.innerHTML = `<img src="${img.previewUrl}"><button class="remove-img" onclick="removePendingImage(${i})">x</button>`;
    imgPreviewStrip.appendChild(div);
  });
}

function handleFileSelect(files) {
  const imgs = [...files].filter(f => f.type.startsWith('image/'));
  if (imgs.length) addPendingImages(imgs);
  document.getElementById('imgFileInput').value = '';
}

async function uploadImage(file) {
  const fd = new FormData();
  fd.append('file', file);
  const res = await fetch('/api/upload', { method: 'POST', headers: { 'X-Auth-Token': authToken }, body: fd });
  const data = await res.json();
  if (data.ok) return data.url;
  throw new Error(data.error || 'Upload failed');
}

function authHeaders() {
  return { 'X-Auth-Token': authToken };
}

async function doLogin() {
  const token = loginInput.value.trim();
  if (!token) {
    loginInput.classList.add('shake');
    loginError.textContent = 'Please enter a token';
    setTimeout(() => loginInput.classList.remove('shake'), 400);
    return;
  }
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });
    const data = await res.json();
    if (data.ok) {
      authToken = token;
      isAdminUser = !!data.is_admin;
      localStorage.setItem('authToken', token);
      loginOverlay.classList.add('hidden');
      showAdminBtn();
      initApp();
    } else {
      loginInput.classList.add('shake');
      loginError.textContent = 'Invalid token';
      setTimeout(() => loginInput.classList.remove('shake'), 400);
      loginInput.value = '';
    }
  } catch(e) {
    loginError.textContent = 'Connection error';
  }
}

function logout() {
  authToken = '';
  localStorage.removeItem('authToken');
  localStorage.removeItem('currentSessionId');
  loginOverlay.classList.remove('hidden');
  loginInput.value = '';
  loginError.textContent = '';
  resetChatUI();

function formatMarkdown(text) {
  // Extract code blocks first to protect them
  const codeBlocks = [];
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    codeBlocks.push('<pre><code>' + escHtml(code) + '</code></pre>');
    return '\x00CB' + (codeBlocks.length - 1) + '\x00';
  });

  const lines = text.split('\n');
  let html = '';
  let inTable = false;
  let inList = false;
  let listType = '';
  let inBlockquote = false;

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Code block placeholder
    const cbMatch = line.match(/^\x00CB(\d+)\x00$/);
    if (cbMatch) {
      if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
      if (inTable) { html += '</tbody></table>'; inTable = false; }
      if (inBlockquote) { html += '</blockquote>'; inBlockquote = false; }
      html += codeBlocks[parseInt(cbMatch[1])];
      continue;
    }

    // Table row
    if (line.trim().match(/^\|(.+)\|$/)) {
      // Check if next line is separator
      const nextLine = (lines[i + 1] || '').trim();
      const isSeparator = line.trim().match(/^\|[\s\-:|]+\|$/);
      if (isSeparator) continue; // skip separator rows

      if (!inTable) {
        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        if (inBlockquote) { html += '</blockquote>'; inBlockquote = false; }
        // Check if next line is a separator => this is header
        if (nextLine.match(/^\|[\s\-:|]+\|$/)) {
          const cells = line.trim().slice(1, -1).split('|').map(c => c.trim());
          html += '<table><thead><tr>' + cells.map(c => '<th>' + inlineFormat(c) + '</th>').join('') + '</tr></thead><tbody>';
          inTable = true;
          i++; // skip separator
          continue;
        } else {
          // Table without header
          html += '<table><tbody>';
          inTable = true;
        }
      }
      const cells = line.trim().slice(1, -1).split('|').map(c => c.trim());
      html += '<tr>' + cells.map(c => '<td>' + inlineFormat(c) + '</td>').join('') + '</tr>';
      continue;
    } else if (inTable) {
      html += '</tbody></table>';
      inTable = false;
    }

    // Blockquote
    if (line.match(/^>\s?/)) {
      if (!inBlockquote) {
        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        html += '<blockquote>';
        inBlockquote = true;
      }
      html += inlineFormat(line.replace(/^>\s?/, '')) + '<br>';
      continue;
    } else if (inBlockquote) {
      html += '</blockquote>';
      inBlockquote = false;
    }

    // Headings
    const hMatch = line.match(/^(#{1,4})\s+(.+)$/);
    if (hMatch) {
      if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
      const level = hMatch[1].length;
      html += '<h' + level + '>' + inlineFormat(hMatch[2]) + '</h' + level + '>';
      continue;
    }

    // Horizontal rule
    if (line.match(/^(\*{3,}|-{3,}|_{3,})$/)) {
      if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
      html += '<hr>';
      continue;
    }

    // Unordered list
    const ulMatch = line.match(/^(\s*)[-*+]\s+(.+)$/);
    if (ulMatch) {
      if (!inList || listType !== 'ul') {
        if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
        html += '<ul>';
        inList = true;
        listType = 'ul';
      }
      html += '<li>' + inlineFormat(ulMatch[2]) + '</li>';
      continue;
    }

    // Ordered list
    const olMatch = line.match(/^(\s*)\d+[.)]\s+(.+)$/);
    if (olMatch) {
      if (!inList || listType !== 'ol') {
        if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
        html += '<ol>';
        inList = true;
        listType = 'ol';
      }
      html += '<li>' + inlineFormat(olMatch[2]) + '</li>';
      continue;
    }

    // Close list if line is not a list item
    if (inList && line.trim() === '') {
      html += listType === 'ul' ? '</ul>' : '</ol>';
      inList = false;
    }

    // Normal line
    if (line.trim() === '') {
      if (!inList) html += '<br>';
    } else {
      html += inlineFormat(line) + '<br>';
    }
  }

  // Close open tags
  if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
  if (inTable) html += '</tbody></table>';
  if (inBlockquote) html += '</blockquote>';

  // Clean up trailing <br>
  html = html.replace(/(<br>)+$/, '');

  return html;
}

function inlineFormat(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/~~(.+?)~~/g, '<del>$1</del>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#07C160;">$1</a>');
}

function getDateLabel(ts) {
  const d = new Date(ts * 1000);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today.getTime() - 86400000);
  const weekAgo = new Date(today.getTime() - 7 * 86400000);
  const msgDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());

  if (msgDate >= today) return 'Today';
  if (msgDate >= yesterday) return 'Yesterday';
  if (msgDate >= weekAgo) return 'Last 7 Days';
  return (d.getMonth()+1) + '/' + d.getDate();
}

function renderSessions(sessions) {
  sessionList.innerHTML = '';
  if (sessions.length === 0) {
    sessionList.innerHTML = '<div style="color:#666;text-align:center;padding:30px 16px;font-size:13px;">No chats yet</div>';
    return;
  }

  let lastLabel = '';
  sessions.forEach(s => {
    const label = getDateLabel(s.updated_at);
    if (label !== lastLabel) {
      lastLabel = label;
      const group = document.createElement('div');
      group.className = 'date-group';
      group.textContent = label;
      sessionList.appendChild(group);
    }

    const item = document.createElement('div');
    item.className = 'session-item' + (s.id === sessionId ? ' active' : '');
    item.innerHTML = `
      <span class="s-icon">💬</span>
      <span class="s-title">${escHtml(s.title || 'New Chat')}</span>
      <div class="s-actions">
        <button class="del" title="Delete" onclick="event.stopPropagation();deleteSession('${escAttr(s.id)}')">🗑</button>
      </div>
    `;
    item.onclick = (e) => {
      if (e.target.closest('.s-actions')) return;
      switchSession(s.id);
    };
    sessionList.appendChild(item);
  });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return s.replace(/'/g, "\\'").replace(/\\/g, '\\\\'); }

function filterSessions(q) {

async function sendMessage() {
  const text = messageInput.value.trim();
  const hasImages = pendingImages.length > 0;
  if ((!text && !hasImages) || isStreaming) return;

  // Upload images first
  let uploadedUrls = [];
  if (hasImages) {
    try {
      uploadedUrls = await Promise.all(pendingImages.map(img => uploadImage(img.file)));
    } catch(e) {
      showNotification('Image upload failed: ' + e.message);
      return;
    }
    pendingImages.forEach(img => URL.revokeObjectURL(img.previewUrl));
    pendingImages = [];
    renderImagePreviews();
  }

  addMessage('user', text, uploadedUrls);
  messageInput.value = '';
  messageInput.style.height = 'auto';
  isStreaming = true;
  sendBtn.disabled = true;

  // Build message text with image references
  let msgText = text;
  if (uploadedUrls.length) {
    const imgDesc = uploadedUrls.map(u => `[Image: ${u}]`).join(' ');
    msgText = msgText ? msgText + '\n' + imgDesc : imgDesc;
  }

  addTypingIndicator();
  taskProgressShow('JoJo thinking...');

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ session_id: sessionId, message: msgText })
    });

    removeTypingIndicator();
    const bubbleEl = addMessage('assistant', '');
    let fullText = '';

    function processSSELines(text) {
      const lines = text.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.text) {
              fullText += data.text;
              bubbleEl.innerHTML = formatMarkdown(fullText);
              scrollToBottom();
              taskProgressUpdate(data.text);
            }
            if (data.error) {
              bubbleEl.textContent = '⚠️ ' + data.error;
            }
          } catch(e) {}
        }
      }
    }

    if (response.body && typeof response.body.getReader === 'function') {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      taskStatus.textContent = 'Waiting for response...';
      taskStartDisconnectWatch();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6));
              if (data.heartbeat) {
                taskGotData();
                taskStatus.textContent = 'PROCESSING...';
                continue;
              }
              if (data.text) {
                fullText += data.text;
                bubbleEl.innerHTML = formatMarkdown(fullText);
                scrollToBottom();
                taskProgressUpdate(data.text);
                taskGotData();
              }
              if (data.error) {
                bubbleEl.textContent = '⚠️ ' + data.error;
              }
            } catch(e) {}
          }
        }
      }
    } else {
      const text = await response.text();
      processSSELines(text);
    }

    taskProgressDone(true);
    checkSpecialMessage(fullText);
    loadSessions();
  } catch(e) {
    removeTypingIndicator();
    addMessage('assistant', '⚠️ Connection lost: ' + e.message);
    taskProgressDone(false);
  }

  isStreaming = false;
  sendBtn.disabled = false;
  messageInput.focus();
}

function exportChat() {
  const rows = chatContainer.querySelectorAll('.msg-row');
  if (rows.length === 0) {
    showNotification('No messages to export');
    return;
  }

  const now = new Date();
  const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  let md = '# JoJo Chat Export\n\n> Exported at ' + dateStr + '\n\n---\n\n';

  rows.forEach(row => {
    const isUser = row.classList.contains('user');
    const bubble = row.querySelector('.bubble');
    if (!bubble) return;
    const text = bubble.innerText || bubble.textContent || '';
    if (!text.trim()) return;
    md += '### ' + (isUser ? '😎 Me' : '🤖 JoJo') + '\n\n' + text.trim() + '\n\n---\n\n';
  });

  const title = allSessions.find(s => s.id === sessionId)?.title || 'chat';
  const safeTitle = title.replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]/g, '_').substring(0, 50);
  const filename = 'JoJo_' + safeTitle + '_' + now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '.md';

  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showNotification('Chat exported!');
}

function renderCronJobs(tasks) {
  if (tasks.length === 0) {
    cronList.innerHTML = '<div class="cron-empty">No scheduled tasks found</div>';
    return;
  }

  let html = '';
  const crons = tasks.filter(t => t.type === 'cron');
  const cronds = tasks.filter(t => t.type === 'cron.d');
  const systemds = tasks.filter(t => t.type === 'systemd');

  if (crons.length > 0) {
    html += '<div class="cron-group-label">User Crontab</div>';
    crons.forEach(t => {
      html += '<div class="cron-item type-cron">';
      html += '<div class="cron-tooltip">' + escHtml(t.desc || '') + '</div>';
      html += '<div class="cron-type">crontab</div>';
      html += '<div class="cron-name">' + escHtml(t.raw) + '</div>';
      html += '</div>';
    });
  }

  if (cronds.length > 0) {
    html += '<div class="cron-group-label">/etc/cron.d</div>';
    cronds.forEach(t => {
      html += '<div class="cron-item type-crond">';
      html += '<div class="cron-tooltip">' + escHtml(t.desc || '') + '</div>';
      html += '<div class="cron-type">cron.d/' + escHtml(t.source || '') + '</div>';
      html += '<div class="cron-name">' + escHtml(t.raw) + '</div>';
      html += '</div>';
    });
  }

  if (systemds.length > 0) {
    html += '<div class="cron-group-label">Systemd Timers</div>';
    systemds.forEach(t => {
      html += '<div class="cron-item type-systemd">';
      html += '<div class="cron-tooltip">' + escHtml(t.desc || '') + '</div>';
      html += '<div class="cron-type">systemd timer</div>';
      html += '<div class="cron-name">' + escHtml(t.unit || '') + '</div>';
      if (t.activates) {
        html += '<div class="cron-detail">Activates: ' + escHtml(t.activates) + '</div>';
      }
      html += '</div>';
    });
  }

  cronList.innerHTML = html;
}

    const users = await res.json();
    renderAdminUsers(users);
  } catch(e) {
    showAdminMsg('Failed to load', 'error');
  }
}

function renderAdminUsers(users) {
  adminUserList.innerHTML = '';
  users.forEach(u => {
    const isAdmin = u === 'shamless';
    const div = document.createElement('div');
    div.className = 'admin-user-item' + (isAdmin ? ' is-admin' : '');
    let html = '<span class="user-name">' + escHtml(u) + '</span>';
    if (isAdmin) html += '<span class="user-badge">ADMIN</span>';
    if (!isAdmin) {
      html += '<div class="user-actions">';
      html += '<button title="Edit" onclick="adminEditUser(\'' + escAttr(u) + '\')">&#9998;</button>';
      html += '<button class="del" title="Delete" onclick="adminDeleteUser(\'' + escAttr(u) + '\')">&#128465;</button>';
      html += '</div>';
    }
    div.innerHTML = html;
    adminUserList.appendChild(div);
  });
}

async function adminAddUser() {
  const input = document.getElementById('adminNewUser');
  const token = input.value.trim();
  if (!token) return;
  try {
    const res = await fetch('/api/admin/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ token })
    });
    const data = await res.json();
    if (data.ok) {
      input.value = '';
      showAdminMsg('User added', 'success');
      loadAdminUsers();
    } else {
      showAdminMsg(data.error, 'error');
    }
  } catch(e) {
    showAdminMsg('Failed', 'error');
  }
}

async function adminEditUser(oldToken) {
  const newToken = prompt('Enter new token for "' + oldToken + '":', oldToken);
  if (!newToken || newToken === oldToken) return;
  try {
    const res = await fetch('/api/admin/users/' + encodeURIComponent(oldToken), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ token: newToken })
    });
    const data = await res.json();
    if (data.ok) {
      showAdminMsg('User updated', 'success');
      loadAdminUsers();
    } else {
      showAdminMsg(data.error, 'error');
    }
  } catch(e) {
    showAdminMsg('Failed', 'error');
  }
}

async function adminDeleteUser(token) {
  if (!confirm('Delete user "' + token + '"? This will also delete all their chat history.')) return;
  try {
    const res = await fetch('/api/admin/users/' + encodeURIComponent(token), {
      method: 'DELETE',
      headers: authHeaders()
    });
    const data = await res.json();
    if (data.ok) {
      showAdminMsg('User deleted', 'success');
      loadAdminUsers();
    } else {
      showAdminMsg(data.error, 'error');
    }
  } catch(e) {
    showAdminMsg('Failed', 'error');
  }
}

messageInput.focus();
</script>
</body>
</html>
